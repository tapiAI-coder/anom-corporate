<script type="text/babel">

const LOGO = window.__LOGO__;
const NAVY = 'var(--acc)',NAVY2 = 'var(--acc2)',NAVY3 = 'var(--acc-glow)';
const BORDER = 'rgba(255,255,255,0.07)',BORDER2 = 'var(--acc-border)';
const FG = 'rgba(255,255,255,0.48)',FG2 = 'rgba(255,255,255,0.25)';
const ACCENT = 'var(--acc-text)';

/* ── Grid BG ── */
const GridBG = ({ opacity = 0.05 }) =>
<div style={{ position: 'absolute', inset: 0, pointerEvents: 'none',
  backgroundImage: `linear-gradient(rgba(232,232,228,${opacity}) 1px,transparent 1px),linear-gradient(90deg,rgba(232,232,228,${opacity}) 1px,transparent 1px)`,
  backgroundSize: '60px 60px' }} />;


/* ── Corner marks ── */
const Corner = ({ pos = 'tl', size = 20 }) => {
  const s = { position: 'absolute', width: size, height: size };
  const borders = {
    tl: { borderTop: '1px solid rgba(232,232,228,0.25)', borderLeft: '1px solid rgba(232,232,228,0.25)', top: 0, left: 0 },
    tr: { borderTop: '1px solid rgba(232,232,228,0.25)', borderRight: '1px solid rgba(232,232,228,0.25)', top: 0, right: 0 },
    bl: { borderBottom: '1px solid rgba(232,232,228,0.25)', borderLeft: '1px solid rgba(232,232,228,0.25)', bottom: 0, left: 0 },
    br: { borderBottom: '1px solid rgba(232,232,228,0.25)', borderRight: '1px solid rgba(232,232,228,0.25)', bottom: 0, right: 0 }
  };
  return <div style={{ ...s, ...borders[pos] }} />;
};

/* ── Tag label ── */
const Tag = ({ children, color = ACCENT }) =>
<span style={{ fontFamily: "'Space Grotesk'", fontSize: 10, fontWeight: 600, letterSpacing: '.18em', textTransform: 'uppercase', color, borderLeft: '2px solid ' + NAVY, paddingLeft: 10 }}>{children}</span>;


/* ── Btn ── */
const Btn = ({ children, onClick, variant = 'primary', style: s = {} }) => {
  const [h, setH] = React.useState(false);
  const base = { fontFamily: "'Space Grotesk'", fontSize: 14, fontWeight: 600, cursor: 'pointer', border: 'none', padding: '12px 28px', transition: 'all 200ms', ...s };
  if (variant === 'outline') return <button onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} style={{ ...base, background: h ? 'rgba(232,232,228,0.1)' : 'transparent', color: 'rgba(255,255,255,0.65)', border: '1px solid rgba(255,255,255,0.2)', borderRadius: 0 }}>{children}</button>;
  return <button onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} style={{ ...base, background: h ? NAVY2 : NAVY, color: '#fff', border: '1px solid ' + NAVY2, borderRadius: 0, boxShadow: h ? '0 0 40px rgba(232,232,228,0.15)' : 'none' }}>{children}</button>;
};

/* ── Section header ── */
const SH = ({ eyebrow, num, title, sub }) =>
<div style={{ marginBottom: 60 }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20 }}>
      {num && <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 11, color: 'rgba(232,232,228,0.4)', letterSpacing: '.06em' }}>{num}</span>}
      <Tag>{eyebrow}</Tag>
    </div>
    <h2 style={{ fontFamily: "'Space Grotesk'", fontSize: 'clamp(32px,5vw,58px)', fontWeight: 700, letterSpacing: '-0.03em', color: '#fff', lineHeight: 1.08, marginBottom: 18, textWrap: 'balance' }}>{title}</h2>
    {sub && <p style={{ fontFamily: "'Noto Sans JP'", fontSize: 15, color: FG, lineHeight: 1.9, maxWidth: 480 }}>{sub}</p>}
  </div>;


/* ── Nav ── */
const Nav = ({ page, go }) => {

function applyAccent(key){
  const a = ACCENTS[key];
  document.documentElement.style.setProperty('--acc',a.primary);
  document.documentElement.style.setProperty('--acc2',a.primary2);
  document.documentElement.style.setProperty('--acc-text',a.text);
  document.documentElement.style.setProperty('--acc-border',a.border);
  document.documentElement.style.setProperty('--acc-surface',a.surface);
  document.documentElement.style.setProperty('--acc-glow',a.glow);
  currentAccent = key;
  window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accent:key}},'*');
}
window.addEventListener('message',e=>{
  if(e.data.type==='__activate_edit_mode') document.getElementById('tweaks-panel').style.display='flex';
  if(e.data.type==='__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display='none';
});
window.parent.postMessage({type:'__edit_mode_available'},'*');
// Apply saved accent on load
const _savedAccent = TWEAK_DEFAULTS.accent || 'offwhite';
setTimeout(()=>applyAccent(_savedAccent), 0);
</script>
<style>
:root {
  --acc: #E8E8E4; --acc2: #d0d0cc; --acc-text: rgba(255,255,255,0.6);
  --acc-border: rgba(232,232,228,0.35); --acc-surface: rgba(232,232,228,0.07); --acc-glow: rgba(232,232,228,0.2);
}
#tweaks-panel {
  display:none; position:fixed; bottom:24px; right:24px; z-index:9999;
  background:#0a0a0f; border:1px solid #1a1a22; padding:16px 20px; flex-direction:column; gap:10px;
  font-family:'Space Grotesk',sans-serif;
}
#tweaks-panel h4 { font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:#555; margin-bottom:4px; }
.tweak-btn { display:flex; align-items:center; gap:10px; background:none; border:1px solid #1a1a22; cursor:pointer; padding:8px 12px; color:#888; font-family:'Space Grotesk'; font-size:12px; font-weight:500; width:100%; text-align:left; transition:all 150ms; }
.tweak-btn.active { border-color:#333; color:#fff; }
.tweak-swatch { width:14px; height:14px; border-radius:2px; flex-shrink:0; }
</style>
<div id="tweaks-panel">
  <h4>Tweaks</h4>
  <div style="font-size:10px;color:#444;letter-spacing:.08em;margin-bottom:4px">ACCENT COLOR</div>
  <button class="tweak-btn" id="btn-navy" onclick="applyAccent('navy');document.querySelectorAll('.tweak-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">
    <div class="tweak-swatch" style="background:#1C3055"></div>Deep Navy
  </button>
  <button class="tweak-btn" id="btn-teal" onclick="applyAccent('teal');document.querySelectorAll('.tweak-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">
    <div class="tweak-swatch" style="background:#0D7B6E"></div>Slate Teal
  </button>
  <button class="tweak-btn active" id="btn-offwhite" onclick="applyAccent('offwhite');document.querySelectorAll('.tweak-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">
    <div class="tweak-swatch" style="background:#E8E8E4"></div>Off-White
  </button>
</div>
</body>
</html>
